<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Foot Locker</title>
    <link rel="stylesheet" href="page4.css">
</head>
<body>

    <div class="background-container">
            <div class="content">
                <div class="logo-wrapper">
                    
                    <img src="image/logo.png" alt="Foot Locker" class="logo">
                </div>
   </div> 
                <h1 class="main-title">Bravo ! Tu as gagné un lot</h1>
                <p class="subtitle">Renseigne tes informations pour débloquer ce dernier</p>

                <form class="prize-form">
                    <div class="input-group">
                        <label for="name">Nom & Prénom :</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email :</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="input-group">
                        <label for="phone">Téléphone :</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                   <a href="page5.html" class="submit-btn">Valider et retenter ma chance </a>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
